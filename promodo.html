<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Focus</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fcfcfc; font-family: 'Quicksand', sans-serif;
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;
        }
        .pomo-card {
            background: white; padding: 50px; border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05); text-align: center; width: 350px;
        }
        .status-label { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: #e5989b; font-weight: 700; margin-bottom: 10px; display: block; }
        .timer-display { font-family: 'Montserrat', sans-serif; font-size: 5rem; font-weight: 900; color: #444; margin: 20px 0; }
        .controls button {
            background: #f0f0f0; border: none; padding: 15px 30px; border-radius: 15px;
            font-weight: 600; cursor: pointer; transition: 0.3s; margin: 5px;
        }
        .controls button:hover { background: #e5989b; color: white; }
        .back-link { display: block; margin-top: 30px; color: #ccc; text-decoration: none; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="pomo-card">
        <span class="status-label" id="status">Sẵn sàng học tập?</span>
        <div class="timer-display" id="timer">25:00</div>
        <div class="controls">
            <button onclick="startTimer()">Bắt đầu</button>
            <button onclick="resetTimer()">Reset</button>
        </div>
        <a href="countdown.html" class="back-link">← Quay lại đồng hồ đếm ngược</a>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let timerId = null;

        function updateDisplay() {
            const m = Math.floor(timeLeft / 60);
            const s = timeLeft % 60;
            document.getElementById('timer').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function startTimer() {
            if (timerId) return;
            document.getElementById('status').innerText = "Đang tập trung...";
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timerId);
                    alert("Hết giờ! Nghỉ ngơi xíu nhé.");
                    resetTimer();
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            updateDisplay();
            document.getElementById('status').innerText = "Sẵn sàng học tập?";
        }
    </script>
</body>
</html>
