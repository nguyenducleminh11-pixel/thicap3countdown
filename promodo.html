<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pomodoro Focus Mode</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">

<style>

:root{
--bg-color:#fcfcfc;
--pomo-red:#e5989b;
--mint:#7db9b6;
--text:#444;
}

body{
background:var(--bg-color);
background-image:radial-gradient(#d1d1d1 1px,transparent 1px);
background-size:25px 25px;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:'Quicksand',sans-serif;
flex-direction:column;
gap:20px;
}

.pomo-card{
background:white;
padding:50px 40px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.05);
text-align:center;
width:380px;
border:1px solid #eee;
position:relative;
}

.pomo-card::before{
content:"";
position:absolute;
top:-15px;
left:50%;
transform:translateX(-50%);
width:100px;
height:35px;
background:rgba(125,185,182,0.2);
border-left:2px dashed rgba(255,255,255,0.5);
border-right:2px dashed rgba(255,255,255,0.5);
}

#label{
color:var(--pomo-red);
font-weight:700;
letter-spacing:3px;
font-size:0.8rem;
margin-bottom:10px;
display:block;
}

.timer-display{
font-family:'Montserrat',sans-serif;
font-size:6rem;
font-weight:900;
color:var(--text);
margin:15px 0;
}

.controls{
display:flex;
justify-content:center;
gap:15px;
margin-top:20px;
}

.btn{
background:var(--mint);
color:white;
border:none;
padding:12px 25px;
border-radius:12px;
font-weight:600;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:translateY(-2px);
filter:brightness(1.1);
}

.btn-reset{
background:#f0f0f0;
color:#888;
}

.back-home{
display:inline-block;
margin-top:35px;
color:#bbb;
text-decoration:none;
font-size:0.85rem;
}

.back-home:hover{
color:var(--pomo-red);
}

/* INPUT MINUTES */

.minute-input{
margin-top:10px;
}

.minute-input input{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
width:120px;
text-align:center;
}

/* DICTIONARY */

.dict-box{
background:white;
width:380px;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
}

.dict-input{
display:flex;
gap:10px;
}

.dict-input input{
flex:1;
padding:10px;
border-radius:10px;
border:1px solid #ddd;
font-family:'Quicksand';
}

.dict-input button{
background:var(--pomo-red);
color:white;
border:none;
padding:10px 15px;
border-radius:10px;
cursor:pointer;
font-size:18px;
}

#dict-result{
margin-top:15px;
font-size:0.9rem;
line-height:1.5;
color:#444;
}

.example{
color:#888;
font-style:italic;
margin-top:5px;
}

</style>
</head>

<body>

<div class="pomo-card">

<span id="label">FOCUS TIME</span>

<div class="timer-display" id="time-display">00:00</div>

<div class="minute-input">
<input id="minute-input" type="number" placeholder="Nhập phút...">
</div>

<div class="controls">
<button class="btn" id="start-btn" onclick="toggleTimer()">Bắt đầu</button>
<button class="btn btn-reset" onclick="resetTimer()">Reset</button>
</div>

<a href="countdown.html" class="back-home">← Quay lại trang đếm ngược</a>

</div>


<!-- DICTIONARY -->

<div class="dict-box">

<div class="dict-input">
<input id="word-input" placeholder="Tra từ tiếng Anh...">
<button onclick="searchWord()">🔍</button>
</div>

<div id="dict-result"></div>

</div>


<script>

/* POMODORO */

let timeLeft=0;
let timerId=null;
let isRunning=false;

const display=document.getElementById('time-display');
const startBtn=document.getElementById('start-btn');

function updateDisplay(){
let mins=Math.floor(timeLeft/60);
let secs=timeLeft%60;
display.innerText=`${mins}:${secs<10?'0':''}${secs}`;
}

function toggleTimer(){

if(!isRunning && timeLeft===0){

const minutes=parseInt(document.getElementById("minute-input").value);

if(!minutes || minutes<=0){
alert("Hãy nhập số phút!");
return;
}

timeLeft=minutes*60;
updateDisplay();
}

if(isRunning){

clearInterval(timerId);
startBtn.innerText="Tiếp tục";
isRunning=false;

}else{

isRunning=true;
startBtn.innerText="Tạm dừng";

timerId=setInterval(()=>{

timeLeft--;
updateDisplay();

if(timeLeft<=0){
clearInterval(timerId);
alert("Tuyệt vời! Bạn đã hoàn thành một phiên tập trung.");
resetTimer();
}

},1000);

}

}

function resetTimer(){

clearInterval(timerId);

timeLeft=0;
display.innerText="00:00";

isRunning=false;
startBtn.innerText="Bắt đầu";

}


/* DICTIONARY */

async function searchWord(){

const word=document.getElementById("word-input").value.trim();
const result=document.getElementById("dict-result");

if(!word)return;

result.innerHTML="Đang tra từ...";

try{

/* dictionary */

const dictRes=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${word}`);
const dictData=await dictRes.json();

const meaning=dictData[0].meanings[0].definitions[0].definition;
const example=dictData[0].meanings[0].definitions[0].example || "";
const type=dictData[0].meanings[0].partOfSpeech;
const phonetic=dictData[0].phonetic || "";

/* translate */

const transRes=await fetch("https://libretranslate.de/translate",{

method:"POST",
headers:{ "Content-Type":"application/json" },

body:JSON.stringify({
q:meaning,
source:"en",
target:"vi",
format:"text"
})

});

const transData=await transRes.json();

const vi=transData.translatedText;

/* related words */

const relRes=await fetch(`https://api.datamuse.com/words?ml=${word}&max=5`);
const relData=await relRes.json();

let suggestions=relData.map(w=>w.word).join(", ");


/* render */

result.innerHTML=`

<b style="font-size:18px">${word}</b><br>

<span style="color:#888">${phonetic} • ${type}</span>

<div style="margin-top:6px">
<b>🇻🇳 Nghĩa:</b> ${vi}
</div>

<div style="margin-top:4px">
<b>📖 English:</b> ${meaning}
</div>

${example?`<div class="example">Example: ${example}</div>`:""}

<div style="margin-top:8px;color:#777">
<b>🔗 Related:</b> ${suggestions}
</div>

`;

}catch{

result.innerHTML="Không tìm thấy từ.";

}

}

document.getElementById("word-input")
.addEventListener("keydown",e=>{
if(e.key==="Enter")searchWord();
});

</script>

</body>
</html>
