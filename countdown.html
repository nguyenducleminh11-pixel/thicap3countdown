<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinh Phục Cấp 3 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700;800&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4a373;
            --sub-accent: #faedcd;
            --highlight: #a3b18a;
            --text: #5f6a6a;
        }

        body {
            margin: 0; padding: 0;
            background: #fdf6e3;
            background-image: linear-gradient(#e9e2c8 1px, transparent 1px);
            background-size: 100% 32px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        /* Container chính */
        .main-note {
            position: relative;
            z-index: 2;
            background: #fff;
            padding: 45px;
            width: 480px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.05);
            border-radius: 12px;
            text-align: center;
            transform: rotate(-0.5deg);
        }

        /* Miếng băng dính trang trí */
        .tape {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(1deg);
            width: 130px;
            height: 40px;
            background: rgba(229, 152, 155, 0.25);
            backdrop-filter: blur(2px);
            border-left: 3px dashed rgba(255,255,255,0.4);
            border-right: 3px dashed rgba(255,255,255,0.4);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--accent);
            margin: 0 0 20px 0;
        }

        /* Thanh tiến độ */
        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--highlight));
            transition: width 1s ease;
        }

        .percent-text {
            font-size: 0.8rem;
            color: #999;
            margin-top: 8px;
            display: block;
        }

        /* Đồng hồ đếm ngược */
        .big-minutes {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent), var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0;
        }

        #s-total {
            font-weight: bold;
            color: #bbb;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        .pomo-link {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: var(--highlight);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(125,185,182,0.3);
        }

        .pomo-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(125,185,182,0.4);
        }

        /* Chat Bot UI */
        #chat-btn {
            position: fixed; bottom: 20px; right: 20px;
            width: 60px; height: 60px;
            background: var(--highlight);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px; cursor: pointer; z-index: 10000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }
        #chat-btn:hover { transform: scale(1.1); }

        #chat-popup {
            position: fixed; bottom: 90px; right: 20px;
            width: 320px; height: 420px;
            background: #fff; border-radius: 15px;
            display: none; flex-direction: column;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            z-index: 9999; overflow: hidden;
            border: 1px solid #eee;
        }

        .chat-header {
            background: var(--highlight); color: white;
            padding: 15px; font-weight: bold; text-align: center;
        }

        #chat-messages {
            flex: 1; padding: 15px; overflow-y: auto;
            font-size: 0.9rem; display: flex; flex-direction: column; gap: 10px;
            background: #fcfcfc;
        }

        .ai-msg {
            background: #e9edc9; padding: 8px 12px;
            border-radius: 12px 12px 12px 2px;
            display: inline-block; max-width: 85%; align-self: flex-start;
            color: #333; line-height: 1.4;
        }

        .user-msg {
            background: #faedcd; padding: 8px 12px;
            border-radius: 12px 12px 2px 12px;
            display: inline-block; max-width: 85%; align-self: flex-end;
            color: #333;
        }

        .chat-input-area {
            display: flex; padding: 10px; border-top: 1px solid #eee;
            background: #fff;
        }

        #chat-input {
            flex: 1; border: none; outline: none;
            padding: 8px; font-family: 'Quicksand';
        }

        #chat-send {
            background: var(--accent); color: white;
            border: none; padding: 8px 15px; border-radius: 8px;
            cursor: pointer; font-weight: bold;
        }

        /* Hiệu ứng hoa anh đào */
        .sakura {
            position: fixed; pointer-events: none;
            z-index: 1; top: -20px;
        }
    </style>
</head>
<body>

<div class="main-note">
    <div class="tape"></div>
    <h1>The Final Sprint</h1>
    <div class="progress-bar-bg">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="percent-text">TIẾN ĐỘ MỤC TIÊU: <span id="percent-text-val">0%</span></span>
    
    <div class="big-minutes" id="m-total">0</div>
    <div id="s-total">0s</div>
    
    <a href="#" class="pomo-link">⏱ Tập trung Pomodoro</a>
    <p style="margin-top: 25px; font-size: 0.85rem; color: #bbb; font-style: italic;">"Sự nỗ lực của hôm nay là nụ cười của ngày mai."</p>
</div>

<div id="chat-btn">💬</div>
<div id="chat-popup">
    <div class="chat-header">AI Động Lực 🌸</div>
    <div id="chat-messages">
        <div class="ai-msg">Chào bạn! Mình luôn ở đây để cổ vũ bạn ôn thi. Cố gắng lên nhé! ✨</div>
    </div>
    <div class="chat-input-area">
        <input id="chat-input" type="text" placeholder="Hỏi AI để lấy động lực..." autocomplete="off">
        <button id="chat-send">Gửi</button>
    </div>
</div>

<script>
/* 1. HIỆU ỨNG SAKURA PARALLAX */
function createSakura() {
    const s = document.createElement('div');
    const size = Math.random() * 15 + 10;
    const depth = Math.random(); 
    s.className = 'sakura';
    s.innerText = '🌸';
    s.style.fontSize = size + 'px';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.opacity = 0.4 + depth * 0.6;
    s.style.filter = `blur(${(1-depth)*2}px)`;
    s.style.zIndex = Math.floor(depth * 10);

    const duration = (5 + (1-depth) * 5) * 1000;
    const anim = s.animate([
        { transform: 'translateY(-20px) rotate(0deg)' },
        { transform: `translateY(110vh) rotate(${Math.random()*360}deg)` }
    ], { duration: duration, easing: 'linear' });

    document.body.appendChild(s);
    anim.onfinish = () => s.remove();
}
setInterval(createSakura, 400);

/* 2. ĐẾM NGƯỢC THỜI GIAN */
function updateCountdown() {
    const target = new Date('June 5, 2026 00:00:00').getTime();
    const start = new Date('January 1, 2026').getTime();
    const now = new Date().getTime();
    const diff = target - now;
    const totalPath = target - start;
    const progress = ((now - start) / totalPath) * 100;

    if (diff <= 0) {
        document.querySelector('.main-note h1').innerText = "Tỏa sáng thôi! 🌟";
        document.getElementById('m-total').innerText = "0";
        return;
    }

    document.getElementById('m-total').innerText = Math.floor(diff/(1000*60)).toLocaleString();
    document.getElementById('s-total').innerText = Math.floor(diff/1000).toLocaleString() + 's';
    document.getElementById('progress-fill').style.width = Math.min(progress, 100) + '%';
    document.getElementById('percent-text-val').innerText = Math.max(0, Math.min(progress, 100)).toFixed(2) + '%';
}
setInterval(updateCountdown, 1000);
updateCountdown();

/* 3. LOGIC CHAT AI + TYPING EFFECT */
const chatMessages = document.getElementById('chat-messages');
const chatInput = document.getElementById('chat-input');
const chatSend = document.getElementById('chat-send');
const chatPopup = document.getElementById('chat-popup');

async function typeEffect(element, text) {
    element.innerHTML = "";
    for (let i = 0; i < text.length; i++) {
        element.innerHTML += text.charAt(i);
        chatMessages.scrollTop = chatMessages.scrollHeight;
        await new Promise(r => setTimeout(r, 25)); // Tốc độ gõ 25ms/ký tự
    }
}
async function handleSendMessage() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    chatInput.value = '';

    // Hiển thị tin nhắn của bạn
    const userDiv = document.createElement('div');
    userDiv.className = 'user-msg';
    userDiv.innerText = msg;
    chatMessages.appendChild(userDiv);

    // Box chờ của AI
    const aiDiv = document.createElement('div');
    aiDiv.className = 'ai-msg';
    aiDiv.innerText = "...";
    chatMessages.appendChild(aiDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    try {
        // 1. DÙNG KEY MỚI NHẤT BẠN VỪA TẠO (Đừng dán lên đây nữa nha)
        const API_KEY = 'AIzaSyDemgzT73oVxDd_s4UXhiBZlLmdxs8Ej1c'; 

        // 2. URL CHUẨN (v1beta là bản chạy tốt nhất cho Flash hiện tại)
        const URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-latest:generateContent?key=${API_KEY};`;

        const res = await fetch(URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [{ text: "Bạn là AI truyền động lực ôn thi lớp 10. Trả lời cực ngắn, tích cực: " + msg }]
                }]
            })
        });

        const data = await res.json();

        // 3. KIỂM TRA LỖI TRƯỚC KHI ĐỌC DỮ LIỆU
        if (data.error) {
            console.error("Lỗi API:", data.error.message);
            aiDiv.innerText = "Lỗi: " + data.error.message;
            return;
        }

        // Kiểm tra xem data có candidates không
        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            const responseText = data.candidates[0].content.parts[0].text;
            await typeEffect(aiDiv, responseText);
        } else {
            aiDiv.innerText = "Gemini đang bận một chút, thử lại sau vài giây nhé! ✨";
        }

    } catch (e) {
        console.error("Lỗi mạng:", e);
        aiDiv.innerText = "Không kết nối được với server AI rồi! 🌐";
    }
}
// Sự kiện Gửi
chatSend.addEventListener('click', handleSendMessage);
chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') handleSendMessage();
});

// Đóng mở Popup
document.getElementById('chat-btn').onclick = () => {
    const isFlex = chatPopup.style.display === 'flex';
    chatPopup.style.display = isFlex ? 'none' : 'flex';
    if (!isFlex) chatInput.focus();
};
</script>

</body>
</html>
