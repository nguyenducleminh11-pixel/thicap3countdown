<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinh Phục Cấp 3 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700;800&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
    --bg-color: #f8f9fa;       /* Màu nền trắng xám dịu */
    --accent: #d4a373;         /* Màu nâu cam nhạt (vintage) */
    --sub-accent: #faedcd;     /* Màu kem bơ */
    --text: #5f6a6a;           /* Màu chữ xám đậm (không bị gắt như màu đen) */
    --highlight: #a3b18a;      /* Màu xanh lá Sage (rất dịu mắt) */
}

        body {
            margin: 0; padding: 0;
            background-color: var(--bg-color);
            background-image: radial-gradient(#cbd5e0 1px, transparent 1px);
            background-size: 25px 25px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        .stage { position: relative; }

        .main-note {
    position: relative;
    z-index: 2;
    background: #fff;
    padding: 45px;
    width: 480px;
    box-shadow: 20px 20px 60px rgba(0,0,0,0.05);
    border: 1px solid #f2f2f2;
    text-align: center;
    transform: rotate(-0.5deg);

    border-radius: 12px;
}

        .tape {
            position: absolute; top: -15px; left: 50%;
            transform: translateX(-50%) rotate(1deg);
            width: 130px; height: 40px;
            background: rgba(229, 152, 155, 0.25);
            backdrop-filter: blur(2px);
            border-left: 3px dashed rgba(255,255,255,0.4);
            border-right: 3px dashed rgba(255,255,255,0.4);
        }

        h1 { font-family: 'Dancing Script', cursive; font-size: 2.8rem; color: var(--accent); margin: 0 0 20px 0; }

        /* Progress Bar */
        .progress-container { margin-bottom: 30px; text-align: left; }
        .progress-label { font-size: 0.7rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
        .progress-bar-bg { width: 100%; height: 12px; background: #f0f0f0; border-radius: 10px; margin-top: 5px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--accent), var(--highlight)); transition: width 1s ease; }

        .label-big { font-size: 0.8rem; letter-spacing: 3px; color: #aaa; text-transform: uppercase; display: block; }

        /* SỐ PHÚT SIÊU TO */
        .big-minutes {
            font-family: 'Montserrat', sans-serif; font-size: 4.5rem;
            font-weight: 800; line-height: 1;
            background: linear-gradient(45deg, var(--sub-accent), var(--highlight));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin: 15px 0; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.05));
        }

        .big-seconds { font-family: 'Montserrat', sans-serif; font-size: 2.5rem; font-weight: 700; color: #999; letter-spacing: 2px; margin-bottom: 20px; }

        /* Nút Pomodoro */
        .pomo-link {
            display: inline-block; margin-top: 25px; padding: 12px 25px;
            background: var(--highlight); color: white; text-decoration: none;
            border-radius: 25px; font-size: 0.85rem; font-weight: 600;
            transition: 0.3s; box-shadow: 0 4px 15px rgba(125, 185, 182, 0.3);
        }
        .pomo-link:hover { transform: translateY(-3px); background: var(--sub-accent); }

        .quote { margin-top: 35px; font-size: 0.9rem; color: #bbb; font-style: italic; }

        .petal { position: absolute; background: #ffebee; border-radius: 150% 0 150% 0; opacity: 0.5; pointer-events: none; animation: fall 8s infinite linear; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body>

    <div class="stage">
        <div class="main-note">
            <div class="tape"></div>
            <h1>The Final Sprint</h1>
            
            <div class="progress-container">
                <span class="progress-label">Tiến độ mục tiêu: <span id="percent-text">0%</span></span>
                <div class="progress-bar-bg">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>

            <span class="label-big">Tổng số phút còn lại</span>
            <div class="big-minutes" id="m-total">0</div>
            <div class="big-seconds" id="s-total">0</div>

            <a href="promodo.html" class="pomo-link">⏱ Tập trung Pomodoro</a>

            <p class="quote">"Sự nỗ lực của hôm nay là nụ cười của ngày mai."</p>
        </div>
    </div>

    <script>
        // Cánh hoa rơi
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + 'vw';
            petal.style.width = Math.random() * 15 + 5 + 'px';
            petal.style.height = petal.style.width;
            petal.style.animationDuration = Math.random() * 4 + 6 + 's';
            document.body.appendChild(petal);
            setTimeout(() => petal.remove(), 8000);
        }
        setInterval(createPetal, 700);

        // Cập nhật đếm ngược và Progress Bar
        function update() {
            const start = new Date('January 1, 2026').getTime();
            const target = new Date('June 5, 2026 00:00:00').getTime();
            const now = new Date().getTime();
            
            const totalDuration = target - start;
            const elapsed = now - start;
            const percent = Math.min(Math.max((elapsed / totalDuration) * 100, 0), 100);

            const diff = target - now;
            if (diff <= 0) {
                document.querySelector('.main-note').innerHTML = "<h1>Tới lúc tỏa sáng rồi! 🌟</h1>";
                return;
            }

            const totalMin = Math.floor(diff / (1000 * 60));
            const totalSec = Math.floor(diff / 1000);

            document.getElementById('m-total').innerText = totalMin.toLocaleString();
            document.getElementById('s-total').innerText = totalSec.toLocaleString() + "s";
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('percent-text').innerText = percent.toFixed(2) + "%";
        }
        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
