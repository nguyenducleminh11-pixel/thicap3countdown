<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chinh Phục Cấp 3 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;700;800&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4a373;
            --sub-accent: #faedcd;
            --highlight: #a3b18a;
            --text: #5f6a6a;
        }

        body {
            margin: 0; padding: 0;
            background: #fdf6e3;
            background-image: linear-gradient(#e9e2c8 1px, transparent 1px);
            background-size: 100% 32px;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
        }

        /* Container chính */
        .main-note {
            position: relative;
            z-index: 2;
            background: #fff;
            padding: 45px;
            width: 90%;
            max-width: 480px;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.05);
            border-radius: 12px;
            text-align: center;
            transform: rotate(-0.5deg);
        }

        /* Miếng băng dính trang trí */
        .tape {
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%) rotate(1deg);
            width: 130px;
            height: 40px;
            background: rgba(229, 152, 155, 0.25);
            backdrop-filter: blur(2px);
            border-left: 3px dashed rgba(255,255,255,0.4);
            border-right: 3px dashed rgba(255,255,255,0.4);
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 2.8rem;
            color: var(--accent);
            margin: 0 0 20px 0;
        }

        /* Thanh tiến độ */
        .progress-bar-bg {
            width: 100%;
            height: 12px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-top: 5px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent), var(--highlight));
            transition: width 1s ease;
        }

        .percent-text {
            font-size: 0.8rem;
            color: #999;
            margin-top: 8px;
            display: block;
        }

        /* Đồng hồ đếm ngược */
        .big-minutes {
            font-family: 'Montserrat', sans-serif;
            font-size: 4.5rem;
            font-weight: 800;
            background: linear-gradient(45deg, var(--accent), var(--highlight));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 15px 0;
        }

        #s-total {
            font-weight: bold;
            color: #bbb;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }

        #exam-date {
            margin-top: 8px;
            font-size: 0.8rem;
            color: #bbb;
            letter-spacing: 1px;
        }

        .pomo-link {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: var(--highlight);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(125,185,182,0.3);
        }

        .pomo-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(125,185,182,0.4);
        }

        /* Hiệu ứng hoa anh đào */
        .sakura {
            position: fixed; pointer-events: none;
            z-index: 1; top: -20px;
        }
    </style>
</head>
<body>

<div class="main-note">
    <div class="tape"></div>
    <h1>The Final Sprint</h1>
    <div class="progress-bar-bg">
        <div class="progress-fill" id="progress-fill"></div>
    </div>
    <span class="percent-text">TIẾN ĐỘ MỤC TIÊU: <span id="percent-text-val">0%</span></span>
    
    <div class="big-minutes" id="m-total">0</div>
    <div id="s-total">0s</div>
    <div id="exam-date">05/06/2026 - 06/06/2026</div>
    <a href="https://nguyenducleminh11-pixel.github.io/thicap3countdown/promodo.html" class="pomo-link">⏱Đồng Hồ Đếm Ngược</a>
    <p style="margin-top: 25px; font-size: 0.85rem; color: #bbb; font-style: italic;">"Don't give up"</p>
</div>

<script>
/* 1. HIỆU ỨNG SAKURA */
function createSakura() {
    const s = document.createElement('div');
    const size = Math.random() * 15 + 10;
    const depth = Math.random(); 
    s.className = 'sakura';
    s.innerText = '🌸';
    s.style.fontSize = size + 'px';
    s.style.left = Math.random() * 100 + 'vw';
    s.style.opacity = 0.4 + depth * 0.6;
    s.style.filter = `blur(${(1-depth)*2}px)`;
    s.style.zIndex = Math.floor(depth * 10);

    const duration = (5 + (1-depth) * 5) * 1000;
    const anim = s.animate([
        { transform: 'translateY(-20px) rotate(0deg)' },
        { transform: `translateY(110vh) rotate(${Math.random()*360}deg)` }
    ], { duration: duration, easing: 'linear' });

    document.body.appendChild(s);
    anim.onfinish = () => s.remove();
}
setInterval(createSakura, 400);

/* 2. ĐẾM NGƯỢC THỜI GIAN */
function updateCountdown() {
    const target = new Date('2026/06/05 07:00:00').getTime();
    const start  = new Date('2026/01/01 00:00:00').getTime();
    const now = new Date().getTime();
    
    const diff = target - now;
    const totalPath = target - start;
    const progress = ((now - start) / totalPath) * 100;

    if (diff <= 0) {
        document.querySelector('.main-note h1').innerText = "Tỏa sáng thôi! 🌟";
        document.getElementById('m-total').innerText = "0";
        document.getElementById('s-total').innerText = "Giờ G đã đến!";
        document.getElementById('progress-fill').style.width = '100%';
        document.getElementById('percent-text-val').innerText = '100%';
        return;
    }

    document.getElementById('m-total').innerText = Math.floor(diff/(1000*60)).toLocaleString();
    document.getElementById('s-total').innerText = Math.floor(diff/1000).toLocaleString() + 's';
    
    const currentProgress = Math.min(Math.max(progress, 0), 100);
    document.getElementById('progress-fill').style.width = currentProgress + '%';
    document.getElementById('percent-text-val').innerText = currentProgress.toFixed(2) + '%';
}
setInterval(updateCountdown, 1000);
updateCountdown();
</script>

</body>
</html>
